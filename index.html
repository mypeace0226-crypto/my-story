function parseSceneBlocks(text) {
  if (!text) return [];
  const lines = text.split("\n"); const scenes = []; let cur = null;
  for (const raw of lines) {
    const t = raw.trim(); if (!t) continue;

    // 장면 헤더 — 모든 변형 처리
    const isSceneHeader =
      t.match(/^\[장면\s*\d+\]\.?$/) ||           // [장면1] [장면 1] [장면1].
      t.match(/^\*{0,2}\[?장면\s*\d+\]?\*{0,2}\.?$/) || // **장면1** **[장면1]**
      t.match(/^장면\s*\d+\s*[.:\-]?\s*$/) ||      // 장면1. 장면1: 장면1-
      t.match(/^\[?Scene\s*\d+\]?\.?$/i) ||         // Scene1 [Scene 1]
      t.match(/^\[?\d+장면\]?\.?$/);                // 1장면

    const isSectionHeader = t.match(/^\[?(intro|verse|pre-?chorus|chorus|bridge|outro)\]?$/i);

    if (isSceneHeader || isSectionHeader) {
      if (cur) scenes.push(cur);
      cur = {header: t.replace(/\*\*/g,"").replace(/[.\-:]\s*$/,""), dialogLine:"", engPrompt:""};
    }
    else if (cur) {

      else if (/[가-힣]/.test(t)) {
        const colonIdx = t.indexOf(":");
        if (colonIdx > -1) {
          const afterColon = t.slice(colonIdx+1).trim();

      }

      else {
        cur.engPrompt = (cur.engPrompt ? cur.engPrompt + " " : "") + t;
      }
    }
  }
  if (cur) scenes.push(cur);
  return scenes.filter(s => s.engPrompt.trim().length > 0);
}

async function callAPI(prompt, tokens=4000, systemPrompt=BASE_BIBLE, retries=3) {
  if (!_S.key) throw new Error("API 키를 입력해주세요. (우측 상단 ⚙ 설정)");
  const cfg = API_CONFIGS[_S.provider];
  for (let i=1; i<=retries; i++) {
    try {
      let res, txt;
      if (_S.provider === "claude") {
        res = await fetch("/api/proxy", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({apiKey:_S.key,model:cfg.model,max_tokens:tokens,system:systemPrompt,messages:[{role:"user",content:prompt}]})});
        if (res.status===529||res.status===503||res.status===502){if(i<retries){await sleep(3000*i);continue;} throw new Error("서버가 혼잡합니다.");}
        if (res.status===429) throw new Error("사용량 한도 초과입니다.");
        if (!res.ok){const t=await res.text();throw new Error("API 오류("+res.status+"): "+t);}
        const d=await res.json(); if(d.error) throw new Error(d.error.message);
        txt=(d.content||[]).map(b=>b.text||"").join("").trim();
      } else if (_S.provider === "openai") {

        const oaiTokens = Math.min(tokens * 3, 16000);
        res = await fetch(cfg.url, {method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+_S.key},body:JSON.stringify({model:cfg.model,max_tokens:oaiTokens,messages:[{role:"system",content:systemPrompt},{role:"user",content:prompt}]})});
        if (!res.ok){const t=await res.text();throw new Error("API 오류("+res.status+"): "+t);}
        const d=await res.json(); if(d.error) throw new Error(d.error.message);
        txt=d.choices?.[0]?.message?.content?.trim()||"";
      } else {
        res = await fetch(cfg.url+"?key="+_S.key, {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:systemPrompt+"\n\n"+prompt}]}],generationConfig:{maxOutputTokens:Math.min(tokens,8192),temperature:0.9}})});
        if (!res.ok){const t=await res.text();throw new Error("API 오류("+res.status+"): "+t);}
        const d=await res.json();
        if(d.error) throw new Error(d.error.message);

      }
      if (!txt) throw new Error("응답이 비어있습니다."); return txt;
    } catch(e) { if (i===retries) throw e; await sleep(2000*i); }
  }
}
function extractScriptOnly(text) {
  if (!text) return "";
  const lines = text.split("\n");
  const result = [];

  for (const line of lines) {
    let t = line.trim();
    if (!t) continue;

    // ── 완전 제거 대상 ──────────────────────────
    // 장면 번호 줄: [장면1] **장면1** 장면1. 등 모든 변형
    if (t.match(/^\*{0,2}\[?장면\s*\d+\]?\*{0,2}\.?\s*$/)) continue;
    if (t.match(/^장면\s*\d+\s*[.:\-]?\s*$/)) continue;
    // 구분선
    if (t.match(/^[-=*]{2,}$/)) continue;
    // 가사 섹션 태그
    if (t.match(/^\[?(intro|verse|pre-?chorus|chorus|bridge|outro)\]?$/i)) continue;
    // 헤더 ##
    if (t.match(/^#{1,4}\s/)) continue;
    // 단독 태그 줄: [나레이션] [다윗] [모세] 등 태그만 있는 줄
    if (t.match(/^\[.{1,20}\]\s*$/)) continue;
    // 영어만 있는 줄
    if (!/[가-힣]/.test(t)) continue;

    // ── 서식 제거 후 텍스트 추출 ────────────────
    // ** 굵은 글씨 제거
    t = t.replace(/\*\*/g, "");

    // [태그] "대사" → 대사만
    const m1 = t.match(/^\[.{1,20}\]\s*[""](.+)[""]$/);
    if (m1) { result.push(m1[1].trim()); continue; }

    // [태그] 대사 또는 [태그]: 대사 → 대사만
    const m2 = t.match(/^\[.{1,20}\]\s*:?\s*(.+)$/);
    if (m2) {
      const inner = m2[1].trim().replace(/^[""]|[""]$/g, "");
      if (/[가-힣]/.test(inner)) { result.push(inner); continue; }
      continue;
    }

    // 태그명: 대사 → 대사만 (나레이션: ..., 다윗: ...)
    const m3 = t.match(/^[가-힣a-zA-Z\s]{1,15}:\s*(.+)$/);
    if (m3) {
      const inner = m3[1].trim().replace(/^[""]|[""]$/g, "");
      if (/[가-힣]/.test(inner)) { result.push(inner); continue; }
      continue;
    }

    // 앞뒤 따옴표 제거 후 순수 텍스트
    t = t.replace(/^[""]|[""]$/g, "").trim();
    if (t && /[가-힣]/.test(t)) result.push(t);
  }

  return result.filter(l => l.length > 0).join("\n");
}

function formatVrew(text) {
  if (!text) return "";
  const lines = text.split("\n");
  const narLines = [];
  for (const line of lines) {
    let t = line.trim();
    if (!t) continue;
    if (t.match(/^\[장면\s*\d+\]/) || t.match(/^장면\s*\d+/)) continue;
    if (t.match(/^\*{0,2}주제\s*유형/)) continue;
    if (t.match(/^\[?STEP\s*\d/i)) continue;
    if (t.match(/^\[?[ABCD]\]\s*(공감|정보|재정의|모순)/)) continue;
    if (t.match(/^━+$/)) continue;
    if (t.match(/^[.…]+$/)) continue;
    if (t.match(/^\*\*[^*]+\*\*:?\s*$/)) continue;
    if (t.match(/^[-]\s+[가-힣]/) && t.length < 30 && !/습니다|입니다|합니다/.test(t)) continue;
    t = t.replace(/^\[나레이션\]\s*/, "").replace(/^나레이션\s*[:：]\s*/, "").trim();
    t = t.replace(/["""''「」『』]/g, "").trim();
    t = t.replace(/[.。]/g, "").trim();
    if (!t) continue;
    narLines.push(t);
  }

  const fullText = narLines.join(" ").replace(/\s+/g, " ").trim();

  // ── 문장 분리 (종결어미 기준) ──
  const sentences = fullText
    .replace(/([?!])\s+/g, "$1|||")
    .replace(/([가-힣]니다\.?)\s+(?=[가-힣])/g, "$1|||")
    .replace(/(바랍니다\.?)\s+(?=[가-힣])/g, "$1|||")
    .replace(/(마세요\.?)\s+(?=[가-힣])/g, "$1|||")
    .replace(/(하세요\.?)\s+(?=[가-힣])/g, "$1|||")
    .replace(/(주세요\.?)\s+(?=[가-힣])/g, "$1|||")
    .replace(/(있어요\.?)\s+(?=[가-힣])/g, "$1|||")
    .replace(/(거예요\.?)\s+(?=[가-힣])/g, "$1|||")
    .replace(/([이하]죠\.?)\s+(?=[가-힣])/g, "$1|||")
    .replace(/([이하]요\.?)\s+(?=[가-힣])/g, "$1|||")
    .replace(/(나요\.?)\s+(?=[가-힣])/g, "$1|||")
    .replace(/(세요\.?)\s+(?=[가-힣])/g, "$1|||")
    .replace(/(겠습니다\.?)\s+(?=[가-힣])/g, "$1|||")
    .replace(/(감사합니다\.?)\s*$/g, "|||$1")
    .split("|||").map(s => s.trim()).filter(s => s.length > 0);

  const MAX = 22;
  const BREAK_CHARS = new Set(["는","은","이","가","을","를","에","로","도","서","고","며","면","지","죠","요","다","만","과","와"]);
  const result = [];

  for (let sent of sentences) {
    if (!sent) continue;
    const hasEmphasis = /정말|진짜|절대|반드시|꼭|완전히|놀랍게도|절대로/.test(sent);
    // 접속어 앞 쉼표
    sent = sent.replace(/(그런데|하지만|그러나|그래서|따라서|실제로|놀랍게도|오히려|즉|또한|특히|결국)(?=[\s])/g, ", $1");
    sent = sent.replace(/\s*,\s*/g, ", ").replace(/^,\s*/, "");
    // 문장 끝 구두점
    const lastChar = sent.slice(-1);
    if (lastChar !== "?" && lastChar !== "!" && lastChar !== ",") {
      sent = sent + (hasEmphasis ? "!" : ".");
    }
    // 문장 끝 구두점 제거 (자막에는 마침표 불필요)
    sent = sent.replace(/[.!]$/, "");
    // 18자 기준 줄바꿈
    result.push(...vrewSplit(sent, MAX, BREAK_CHARS));
  }

  return result.filter(s => s.trim().length > 0).join("\n");
}

function vrewSplit(text, max, breakChars) {
  const result = [];
  let remain = text.trim();

  while (remain.length > 0) {
    if (remain.length <= max) { result.push(remain); break; }

    let cut = -1;

    // 1순위: max 이하 가장 마지막 쉼표 (쉼표 포함해서 자름)
    for (let i = Math.min(max, remain.length-1); i >= 5; i--) {
      if (remain[i] === ",") { cut = i+1; break; }
    }

    // 2순위: 조사/어미 뒤 공백
    if (cut === -1) {
      for (let i = Math.min(max, remain.length-1); i >= 6; i--) {
        if (remain[i] === " " && breakChars && breakChars.has(remain[i-1])) { cut = i+1; break; }
      }
    }

    // 3순위: 일반 공백
    if (cut === -1) {
      for (let i = Math.min(max, remain.length-1); i >= 5; i--) {
        if (remain[i] === " ") { cut = i+1; break; }
      }
    }

    if (cut === -1 || cut >= remain.length) { result.push(remain); break; }
    result.push(remain.slice(0, cut).trim());
    remain = remain.slice(cut).trim();
  }

  return result.filter(s => s.length > 0);
}


function downloadScriptTxt(text, topic) {
  if (!text) return;
  const srcLines = text.split("\n");
  const narLines = [];
  for (const line of srcLines) {
    let t = line.trim();
    if (!t) continue;
    if (t.match(/^\[장면\s*\d+\]/) || t.match(/^장면\s*\d+/)) continue;
    if (t.match(/^\*{0,2}주제\s*유형/)) continue;
    if (t.match(/^\[?STEP\s*\d/i)) continue;
    if (t.match(/^━+$/)) continue;
    t = t.replace(/^\[나레이션\]\s*/, "").replace(/^나레이션\s*[:：]\s*/, "").trim();
    t = t.replace(/[\u201C\u201D\u2018\u2019\u300C\u300D\u300E\u300F]/g, "").trim();
    if (!t) continue;
    narLines.push(t);
  }
  const fullText = narLines.join(" ").replace(/\s+/g, " ").trim();
  const CHUNK = 500;
  const chunks = [];
  let remain = fullText;
  while (remain.length > 0) {
    if (remain.length <= CHUNK) { chunks.push(remain); break; }
    let cut = CHUNK;
    for (let i = CHUNK; i >= CHUNK - 50; i--) {
      if (remain[i] === " ") { cut = i; break; }
    }
    chunks.push(remain.slice(0, cut).trim());
    remain = remain.slice(cut).trim();
  }
  const fileName = (topic || "대본") + "_분할.txt";
  const sep = "==============================";
  const fileContent = chunks.map((chunk, i) =>
    "[파트" + (i+1) + " / 총" + chunks.length + "파트 · " + chunk.length + "자]\n\n" + chunk
  ).join("\n\n" + sep + "\n\n");
  const blob = new Blob([fileContent], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = fileName; a.click();
  URL.revokeObjectURL(url);
}

function extractEnglishOnly(lines) {

    // 건너뛸 줄
    if (t.startsWith("[대사 연결]") || t.startsWith("[가사 연결]")) continue;

    // 장면 헤더 — 전체 복사 시 구분선 역할 (빈 줄 추가)
    if (t.match(/^\[장면\s*\d+\]$/) || t.match(/^\*?\*?장면\s*\d+\*?\*?$/)) {
      if (result.length > 0) result.push("");
      continue;
    }
    // 한글 접두어 + 콜론 + 영어 내용 추출
    // 예: "영어 이미지 프롬프트: stick figure..."
    if (/[가-힣]/.test(t)) {

    // 순수 영어 줄
    result.push(t);
  }
  return result.join("\n").trim();
}
function parseBlocks(text) {

  for (const line of lines) { const t=line.trim(); const isHeader=t.match(/^\[장면\s*\d+\]$/)||t.match(/^\*?\*?장면\s*\d+\*?\*?$/)||t.match(/^#+\s*(장면|Scene)\s*\d+/i)||t.match(/^\[?(intro|verse|pre-chorus|chorus|bridge|outro)\]?$/i); if(isHeader){if(cur) blocks.push(cur); cur={title:t.replace(/\*\*/g,""),lines:[]};} else if(cur) cur.lines.push(line); else cur={title:"",lines:[line]}; }
  if(cur) blocks.push(cur); return blocks.filter(b=>b.lines.some(l=>l.trim()));
}

      </div>
      {showCfg&&<div style={{maxWidth:680,margin:"12px auto 0",padding:"0 16px"}}>
        <div style={{background:C.card,borderRadius:12,border:"1px solid "+C.border,padding:16}}>
          <div style={{fontWeight:700,color:C.gold,fontSize:14,marginBottom:12}}>⚙ API 설정</div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:12,color:C.textSub,marginBottom:6,fontWeight:600}}>API 선택</div>
            <div style={{display:"flex",gap:8}}>
              {Object.entries(API_CONFIGS).map(([k,v])=>(
                <button key={k} onClick={()=>setApiProv(k)} style={{flex:1,padding:"8px 4px",borderRadius:8,border:"2px solid "+(apiProv===k?pColor[k]:C.border),background:apiProv===k?pColor[k]+"22":"transparent",color:apiProv===k?pColor[k]:C.textMuted,fontSize:11,fontWeight:apiProv===k?700:400,cursor:"pointer"}}>
                  {k==="claude"?"🟠 Claude":k==="openai"?"🟢 GPT-4o":"🔵 Gemini"}
                </button>
              ))}
            </div>
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:12,color:C.textSub,marginBottom:6,fontWeight:600}}>API 키</div>
            <div style={{display:"flex",gap:6}}>
              <input type={showKey?"text":"password"} value={apiKey} onChange={e=>setApiKey(e.target.value)} onFocus={()=>setApiKey("")} placeholder={apiProv==="claude"?"sk-ant-...":apiProv==="openai"?"sk-...":"AIza..."} style={{flex:1,padding:"8px 12px",borderRadius:8,border:"1px solid "+C.border,background:C.input,color:C.text,fontSize:12,outline:"none",fontFamily:"monospace"}}/>
              <button onClick={()=>setShowKey(!showKey)} style={{padding:"8px 10px",borderRadius:8,border:"1px solid "+C.border,background:"transparent",color:C.textMuted,cursor:"pointer",fontSize:12}}>{showKey?"🙈":"👁"}</button>
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={saveApi} style={{flex:1,padding:"9px",borderRadius:8,border:"none",background:C.gold,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>✅ 저장</button>
            <button onClick={()=>setShowCfg(false)} style={{padding:"9px 16px",borderRadius:8,border:"1px solid "+C.border,background:"transparent",color:C.textMuted,fontSize:13,cursor:"pointer"}}>취소</button>
          </div>
          {isSet&&<div style={{marginTop:10,padding:"6px 10px",borderRadius:6,background:pColor[apiProv]+"18",color:pColor[apiProv],fontSize:11,fontWeight:600,textAlign:"center"}}>✅ {API_CONFIGS[apiProv].name} 연결됨</div>}
        </div>
      </div>}
      <div style={{maxWidth:680,margin:"0 auto",padding:"16px 16px 0"}}>
        {!isSet&&<div style={{marginBottom:12,padding:"10px 14px",borderRadius:8,background:"#8a6a2018",border:"1px solid "+C.gold,color:C.gold,fontSize:12,textAlign:"center"}}>⚠ 우측 상단 <b>⚙ API 설정</b>에서 API 키를 먼저 입력해주세요</div>}
        <div style={{display:"flex",gap:0,marginBottom:20,borderRadius:10,overflow:"hidden",border:"1px solid "+C.border}}>
          {[{key:"bible",label:"✝ 성경 애니메이션"},{key:"psych",label:"🧠 심리학 영상"}].map(c=>(
            <button key={c.key} onClick={()=>setCategory(c.key)} style={{flex:1,padding:"13px 8px",border:"none",background:category===c.key?C.tabActive:C.tabInactive,color:category===c.key?C.gold:C.textMuted,fontWeight:category===c.key?700:400,fontSize:14,cursor:"pointer",transition:"all 0.2s"}}>
              {c.label}
            </button>
          ))}
        </div>
        {category==="bible"?<BibleGenerator/>:<PsychGenerator/>}
      </div>
    </div>
  );
}


    ReactDOM.render(<App/>, document.getElementById('root'));
  </script>
</body>
</html>
