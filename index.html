function parseSceneBlocks(text) {
  if (!text) return [];
  const lines = text.split("\n"); const scenes = []; let cur = null;
  for (const raw of lines) {
    const t = raw.trim(); if (!t) continue;

    // 장면 헤더 — 모든 변형 처리
    const isSceneHeader =
      t.match(/^\[장면\s*\d+\]\.?$/) ||           // [장면1] [장면 1] [장면1].
      t.match(/^\*{0,2}\[?장면\s*\d+\]?\*{0,2}\.?$/) || // **장면1** **[장면1]**
      t.match(/^장면\s*\d+\s*[.:\-]?\s*$/) ||      // 장면1. 장면1: 장면1-
      t.match(/^\[?Scene\s*\d+\]?\.?$/i) ||         // Scene1 [Scene 1]
      t.match(/^\[?\d+장면\]?\.?$/);                // 1장면

    const isSectionHeader = t.match(/^\[?(intro|verse|pre-?chorus|chorus|bridge|outro)\]?$/i);

    if (isSceneHeader || isSectionHeader) {
      if (cur) scenes.push(cur);
      cur = {header: t.replace(/\*\*/g,"").replace(/[.\-:]\s*$/,""), dialogLine:"", engPrompt:""};
    }
    else if (cur) {
      // [대사 연결] / [가사 연결] 한글 줄
      if (t.startsWith("[대사 연결]") || t.startsWith("[가사 연결]")) {
        cur.dialogLine = t;
      }
      // 한글 접두어 + 콜론 + 영어 내용 (예: "영어 이미지 프롬프트: stick figure...")
      else if (/[가-힣]/.test(t)) {
        const colonIdx = t.indexOf(":");
        if (colonIdx > -1) {
          const afterColon = t.slice(colonIdx+1).trim();
          if (afterColon.length > 10 && !/[가-힣]/.test(afterColon)) {
            cur.engPrompt = (cur.engPrompt ? cur.engPrompt + " " : "") + afterColon;
          }
        }
        // 한글만 있는 줄은 건너뜀
      }
      // 순수 영어 줄
      else {
        cur.engPrompt = (cur.engPrompt ? cur.engPrompt + " " : "") + t;
      }
    }
  }
  if (cur) scenes.push(cur);
  return scenes.filter(s => s.engPrompt.trim().length > 0);
}

const DEFAULT_CAMERAS = ["Slow dolly in, medium shot,","Pan left to right, medium wide,","Tracking shot, medium close-up,","Tilt up, wide establishing shot,","Static medium shot, slight zoom,","Crane shot, wide angle,"];

function pickCamera(engPrompt, index) {
  const lower = engPrompt.toLowerCase();
  for (const rule of CAMERA_RULES) if (rule.keywords.some(kw => lower.includes(kw))) return rule.camera;
  return DEFAULT_CAMERAS[index % DEFAULT_CAMERAS.length];
}
function buildVideoPromptsFromScenes(scenes, imgSuffix, videoSuffix) {
  return scenes.map((scene, i) => {
    const camera = pickCamera(scene.engPrompt, i);
    let base = scene.engPrompt;
    const si = base.toLowerCase().indexOf(imgSuffix.slice(0, 25).toLowerCase());
    if (si > 20) base = base.slice(0, si).trim().replace(/[,.]$/, "");
    return `${camera} ${base}, smooth motion, ${videoSuffix}`;
  });
}
function assembleFromScenes(scenes, videoPrompts, isVideo) {
  return scenes.map((s, i) => { const p = isVideo ? (videoPrompts[i] || s.engPrompt) : s.engPrompt; return `[장면${i+1}]\n${s.dialogLine}\n${p}`; }).join("\n\n");
}

function extractScriptOnly(text) {
  if (!text) return "";
  const lines = text.split("\n");
  const result = [];

  for (const line of lines) {
    let t = line.trim();
    if (!t) continue;

    // ── 완전 제거 대상 ──────────────────────────
    // 장면 번호 줄: [장면1] **장면1** 장면1. 등 모든 변형
    if (t.match(/^\*{0,2}\[?장면\s*\d+\]?\*{0,2}\.?\s*$/)) continue;
    if (t.match(/^장면\s*\d+\s*[.:\-]?\s*$/)) continue;
    // 구분선
    if (t.match(/^[-=*]{2,}$/)) continue;
    // 가사 섹션 태그
    if (t.match(/^\[?(intro|verse|pre-?chorus|chorus|bridge|outro)\]?$/i)) continue;
    // 헤더 ##
    if (t.match(/^#{1,4}\s/)) continue;
    // 단독 태그 줄: [나레이션] [다윗] [모세] 등 태그만 있는 줄
    if (t.match(/^\[.{1,20}\]\s*$/)) continue;
    // 영어만 있는 줄
    if (!/[가-힣]/.test(t)) continue;

    // ── 서식 제거 후 텍스트 추출 ────────────────
    // ** 굵은 글씨 제거
    t = t.replace(/\*\*/g, "");

    // [태그] "대사" → 대사만
    const m1 = t.match(/^\[.{1,20}\]\s*[""](.+)[""]$/);
    if (m1) { result.push(m1[1].trim()); continue; }

    // [태그] 대사 또는 [태그]: 대사 → 대사만
    const m2 = t.match(/^\[.{1,20}\]\s*:?\s*(.+)$/);
    if (m2) {
      const inner = m2[1].trim().replace(/^[""]|[""]$/g, "");
      if (/[가-힣]/.test(inner)) { result.push(inner); continue; }
      continue;
    }

    // 태그명: 대사 → 대사만 (나레이션: ..., 다윗: ...)
    const m3 = t.match(/^[가-힣a-zA-Z\s]{1,15}:\s*(.+)$/);
    if (m3) {
      const inner = m3[1].trim().replace(/^[""]|[""]$/g, "");
      if (/[가-힣]/.test(inner)) { result.push(inner); continue; }
      continue;
    }

    // 앞뒤 따옴표 제거 후 순수 텍스트
    t = t.replace(/^[""]|[""]$/g, "").trim();
    if (t && /[가-힣]/.test(t)) result.push(t);
  }

  return result.filter(l => l.length > 0).join("\n");
}
function extractEnglishOnly(lines) {
  const result = [];
  for (const l of lines) {
    const t = l.trim();
    if (!t) continue;
    // 건너뛸 줄
    if (t.startsWith("[대사 연결]") || t.startsWith("[가사 연결]")) continue;
    if (t.match(/^\[?(intro|verse|pre-?chorus|chorus|bridge|outro)\]?$/i)) continue;
    if (t.match(/^프롬프트\s*\d+/)) continue;
    // 장면 헤더 — 빈 줄로 구분선 역할
    if (t.match(/^\[장면\s*\d+\]$/) || t.match(/^\*?\*?장면\s*\d+\*?\*?$/)) {
      if (result.length > 0) result.push(""); // 장면 사이 빈 줄
      continue;
    }
    // 한글 접두어 + 콜론 + 영어 내용 추출 (예: "영어 이미지 프롬프트: ...")
    if (/[가-힣]/.test(t)) {
      const colonIdx = t.indexOf(":");
      if (colonIdx > -1) {
        const after = t.slice(colonIdx + 1).trim();
        if (after.length > 10 && !/[가-힣]/.test(after)) {
          result.push(after);
        }
      }
      continue;
    }
    // 순수 영어 줄
    result.push(t);
  }
  return result.join("\n").trim();
}

  for (const line of lines) { const t=line.trim(); const isHeader=t.match(/^\[장면\s*\d+\]$/)||t.match(/^\*?\*?장면\s*\d+\*?\*?$/)||t.match(/^#+\s*(장면|Scene)\s*\d+/i)||t.match(/^\[?(intro|verse|pre-chorus|chorus|bridge|outro)\]?$/i); if(isHeader){if(cur) blocks.push(cur); cur={title:t.replace(/\*\*/g,""),lines:[]};} else if(cur) cur.lines.push(line); else cur={title:"",lines:[line]}; }

          </div>
        )}
        <div style={{marginBottom:18}}>
          <div style={{color:C.textSub,fontSize:13,marginBottom:8,fontWeight:600}}>⚙️ 생성 항목 선택</div>
          <div style={{display:"flex",gap:8}}>
            {[{checked:genImg,onChange:setGenImg,label:"🖼 이미지 프롬프트"},{checked:genVideo,onChange:setGenVideo,label:"🎥 영상 프롬프트"}].map(({checked,onChange,label})=>(
              <div key={label} onClick={()=>onChange(!checked)} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"9px 8px",borderRadius:8,cursor:"pointer",border:`2px solid ${checked?C.gold:C.border}`,background:checked?"#c8b06022":"transparent",userSelect:"none"}}>
                <span style={{fontSize:13,fontWeight:700,color:checked?C.gold:C.textMuted}}>{label}</span>
                <span style={{fontSize:12,fontWeight:800,color:checked?C.gold:C.textMuted}}>{checked?"✅":"⬜"}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{marginBottom:18}}>
          <div style={{color:C.textSub,fontSize:13,marginBottom:8,fontWeight:600}}>🎨 이미지 스타일</div>
          {IMG_STYLES_PSYCH.map(s=>(
            <label key={s.key} style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",marginBottom:8,padding:"9px 12px",borderRadius:8,border:`2px solid ${imgStyle===s.key?C.gold:C.border}`,background:imgStyle===s.key?"#c8b06022":"transparent"}}>
              <input type="radio" name="pImgStyle" value={s.key} checked={imgStyle===s.key} onChange={()=>setImgStyle(s.key)} style={{accentColor:C.gold,width:15,height:15}}/>
              <div><div style={{color:imgStyle===s.key?C.gold:C.text,fontWeight:700,fontSize:13}}>{s.label}</div><div style={{color:C.textMuted,fontSize:12}}>{s.desc}</div></div>
            </label>
          ))}
        </div>
        <div style={{marginBottom:18,padding:"12px 14px",background:"#c8b89822",borderRadius:8,border:`1px solid ${C.border}`}}>
          <div style={{color:C.textSub,fontSize:13,fontWeight:600,marginBottom:10}}>⚙️ 추가 생성 옵션</div>
          <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",marginBottom:8}}>
            <input type="checkbox" checked={genChar} onChange={e=>setGenChar(e.target.checked)} style={{width:16,height:16,accentColor:C.gold}}/>
            <div><span style={{color:C.text,fontSize:13,fontWeight:600}}>🎭 캐릭터 컷 5종 생성</span><div style={{color:C.textMuted,fontSize:11,marginTop:2}}>썸네일용 단독 캐릭터 포즈 · 토큰 절약 시 체크 해제</div></div>
          </label>
          <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}>
            <input type="checkbox" checked={genBgm} onChange={e=>setGenBgm(e.target.checked)} style={{width:16,height:16,accentColor:C.gold}}/>
            <div><span style={{color:C.text,fontSize:13,fontWeight:600}}>🎹 BGM 수노 프롬프트 생성</span><div style={{color:C.textMuted,fontSize:11,marginTop:2}}>솔로 피아노 · 잔잔한 연주 · 보컬 없음 · 대본 분위기 자동 반영</div></div>
          </label>
        </div>
        <div style={{marginBottom:18}}>
          <div onClick={()=>setShowRefBox(p=>!p)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 16px",borderRadius:showRefBox?"10px 10px 0 0":10,cursor:"pointer",border:`2px solid ${refScript.trim()?C.psych:C.border}`,background:refScript.trim()?"#3a5a8a15":"transparent"}}>
            <div><div style={{fontSize:13,fontWeight:700,color:refScript.trim()?C.psych:C.text}}>🔍 인기 영상 대본 분석 {refScript.trim()?"✅ 입력됨":"(선택)"}</div><div style={{fontSize:11,color:C.textMuted,marginTop:2}}>조회수 높은 영상 대본을 붙여넣으면 성공 패턴을 분석해서 새 대본에 반영해요</div></div>
            <span style={{color:C.textMuted,fontSize:16}}>{showRefBox?"▲":"▼"}</span>
          </div>
          {showRefBox&&(<div style={{border:`2px solid ${C.psych}`,borderTop:"none",borderRadius:"0 0 10px 10px",padding:12,background:"#f0f4f8"}}>
            <textarea value={refScript} onChange={e=>setRefScript(e.target.value)} placeholder="인기 심리학 영상의 대본을 여기에 붙여넣어 주세요." style={{width:"100%",minHeight:160,padding:"10px 12px",borderRadius:8,border:`1px solid ${C.psychBorder}`,background:"#fff",color:C.text,fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"inherit",resize:"vertical",lineHeight:1.7}}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}>
              <span style={{fontSize:11,color:C.textMuted}}>{refScript.length>0?`${refScript.length}자 입력됨`:"대본을 붙여넣으면 생성 시 자동 분석됩니다"}</span>
              {refScript.trim()&&<button onClick={()=>{setRefScript("");setRefAnalysis("");}} style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${C.psychBorder}`,background:"transparent",color:C.textMuted,fontSize:11,cursor:"pointer"}}>지우기</button>}
            </div>
          </div>)}
        </div>
        <div style={{marginBottom:18}}>
          <div style={{color:C.textSub,fontSize:13,marginBottom:8,fontWeight:600}}>🧠 추천 심리학 주제</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
            {PSYCH_TOPICS.map(t=>(<button key={t} onClick={()=>setTopic(t)} style={{padding:"4px 10px",borderRadius:16,border:`1px solid ${topic===t?C.gold:C.border}`,background:topic===t?"#c8b06022":"transparent",color:topic===t?C.gold:C.textMuted,fontSize:12,cursor:"pointer",fontWeight:topic===t?700:400}}>{t}</button>))}
          </div>
          <input value={topic} onChange={e=>setTopic(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!loading&&generate()} placeholder="직접 입력: 예) 자기효능감, 확증 편향, 번아웃..." style={{width:"100%",padding:"11px 13px",borderRadius:8,border:`1px solid ${C.border}`,background:C.input,color:C.text,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
        </div>
        <button onClick={generate} disabled={loading||!topic.trim()} style={{width:"100%",padding:"13px 0",borderRadius:10,background:loading||!topic.trim()?C.btnDisabled:`linear-gradient(135deg, ${C.psych}, ${C.psychLight})`,color:loading||!topic.trim()?"#888":"#fff",fontWeight:700,fontSize:15,border:"none",cursor:loading||!topic.trim()?"not-allowed":"pointer",letterSpacing:1}}>
          {loading?"✨ 생성 중...":"🧠 대본 생성하기"}
        </button>
        {error&&<div style={{color:"#c04040",fontSize:12,marginTop:10,padding:"8px 12px",background:"#ffeaea",borderRadius:6}}>⚠️ {error}</div>}
      </div>
      {loading&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:24,marginTop:16}}><div style={{color:C.psych,fontWeight:700,marginBottom:4}}>생성 진행 중</div><ProgressBar current={step} steps={allSteps.map((s,i)=>i===step&&stepDetail?`${s} (${stepDetail})`:s)} color={C.psych}/></div>}
      {sections&&!loading&&(
        <div style={{marginTop:20}}>
          <div style={{position:"relative",display:"flex",alignItems:"flex-end"}}>
            <button onClick={()=>{const el=document.getElementById("ptab");if(el)el.scrollBy({left:-160,behavior:"smooth"});}} style={{flexShrink:0,width:28,height:34,borderRadius:"8px 8px 0 0",border:`1px solid ${C.border}`,borderRight:"none",background:C.tabInactive,color:C.psych,cursor:"pointer",fontSize:14,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
            <div id="ptab" style={{display:"flex",gap:4,overflowX:"auto",flex:1,scrollbarWidth:"thin"}}>
              {allTabs.map(tab=><button key={tab} onClick={()=>setActiveTab(tab)} style={{padding:"7px 12px",borderRadius:"8px 8px 0 0",border:`1px solid ${C.border}`,background:activeTab===tab?C.tabActive:C.tabInactive,color:activeTab===tab?C.psych:C.textMuted,fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{tab}</button>)}
            </div>
            <button onClick={()=>{const el=document.getElementById("ptab");if(el)el.scrollBy({left:160,behavior:"smooth"});}} style={{flexShrink:0,width:28,height:34,borderRadius:"8px 8px 0 0",border:`1px solid ${C.border}`,borderLeft:"none",background:C.tabInactive,color:C.psych,cursor:"pointer",fontSize:14,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
          </div>
          <div style={{background:C.tabActive,border:`1px solid ${C.border}`,borderRadius:"0 8px 8px 8px",padding:20,minHeight:200}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
              <span style={{color:C.textMuted,fontSize:12}}>{activeTab} · {curContent.length}자</span>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {activeTab==="대본"&&<CopyBtn text={extractScriptOnly(curContent)} label="📋 대사만 복사"/>}
                {isBlockTab(activeTab)&&<CopyBtn text={extractEnglishOnly((sections&&sections[activeTab]||"").split("\n"))} label="📋 영어 전체 복사"/>}
                {(activeTab==="🖼 썸네일 구도 5종"||activeTab==="🎭 캐릭터 컷 5종")&&<CopyBtn text={extractEnglishOnly(curContent.split("\n"))} label="📋 영어만 복사"/>}
                <CopyBtn text={curContent} label="📋 전체 복사"/>
              </div>
            </div>
            {isBlockTab(activeTab)?<BlockViewer text={curContent}/>:<PlainContent text={curContent}/>}
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [category,setCategory]=useState("bible");
  const [showCfg,setShowCfg]=useState(false);
  const [apiKey,setApiKey]=useState(_S.key);
  const [apiProv,setApiProv]=useState(_S.provider);
  const [showKey,setShowKey]=useState(false);
  const saveApi=()=>{_S.key=apiKey;_S.provider=apiProv;localStorage.setItem("yk",apiKey);localStorage.setItem("yp",apiProv);setShowCfg(false);};
  const pColor={claude:"#D4A854",openai:"#10A37F",gemini:"#4285F4"};
  const isSet=apiKey.length>10;
  return (
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"Georgia,serif",padding:"0 0 40px"}}>
      <div style={{textAlign:"center",padding:"28px 20px 16px",borderBottom:`1px solid ${C.border}`,position:"relative"}}>
        <div style={{fontSize:30,marginBottom:4}}>✝ 🧠</div>
        <h1 style={{color:C.gold,fontSize:19,fontWeight:700,letterSpacing:2,margin:0}}>유튜브 콘텐츠 대본 생성기</h1>
        <p style={{color:C.textMuted,fontSize:11,marginTop:4}}>성경 애니메이션 · 심리학 영상 · Disney 뮤지컬</p>
        <button onClick={()=>setShowCfg(!showCfg)} style={{position:"absolute",top:16,right:16,padding:"6px 12px",borderRadius:8,border:"1px solid "+(isSet?pColor[apiProv]:C.border),background:"transparent",color:isSet?pColor[apiProv]:C.textMuted,fontSize:11,cursor:"pointer",fontWeight:600}}>
          {isSet?"⚙ "+apiProv.toUpperCase():"⚙ API 설정"}
        </button>
      </div>
      {showCfg&&<div style={{maxWidth:680,margin:"12px auto 0",padding:"0 16px"}}>
        <div style={{background:C.card,borderRadius:12,border:"1px solid "+C.border,padding:16}}>
          <div style={{fontWeight:700,color:C.gold,fontSize:14,marginBottom:12}}>⚙ API 설정</div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:12,color:C.textSub,marginBottom:6,fontWeight:600}}>API 선택</div>
            <div style={{display:"flex",gap:8}}>
              {Object.entries(API_CONFIGS).map(([k,v])=>(
                <button key={k} onClick={()=>setApiProv(k)} style={{flex:1,padding:"8px 4px",borderRadius:8,border:"2px solid "+(apiProv===k?pColor[k]:C.border),background:apiProv===k?pColor[k]+"22":"transparent",color:apiProv===k?pColor[k]:C.textMuted,fontSize:11,fontWeight:apiProv===k?700:400,cursor:"pointer"}}>
                  {k==="claude"?"🟠 Claude":k==="openai"?"🟢 GPT-4o":"🔵 Gemini"}
                </button>
              ))}
            </div>
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:12,color:C.textSub,marginBottom:6,fontWeight:600}}>API 키</div>
            <div style={{display:"flex",gap:6}}>
              <input type={showKey?"text":"password"} value={apiKey} onChange={e=>setApiKey(e.target.value)} onFocus={()=>setApiKey("")} placeholder={apiProv==="claude"?"sk-ant-...":apiProv==="openai"?"sk-...":"AIza..."} style={{flex:1,padding:"8px 12px",borderRadius:8,border:"1px solid "+C.border,background:C.input,color:C.text,fontSize:12,outline:"none",fontFamily:"monospace"}}/>
              <button onClick={()=>setShowKey(!showKey)} style={{padding:"8px 10px",borderRadius:8,border:"1px solid "+C.border,background:"transparent",color:C.textMuted,cursor:"pointer",fontSize:12}}>{showKey?"🙈":"👁"}</button>
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={saveApi} style={{flex:1,padding:"9px",borderRadius:8,border:"none",background:C.gold,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>✅ 저장</button>
            <button onClick={()=>setShowCfg(false)} style={{padding:"9px 16px",borderRadius:8,border:"1px solid "+C.border,background:"transparent",color:C.textMuted,fontSize:13,cursor:"pointer"}}>취소</button>
          </div>
          {isSet&&<div style={{marginTop:10,padding:"6px 10px",borderRadius:6,background:pColor[apiProv]+"18",color:pColor[apiProv],fontSize:11,fontWeight:600,textAlign:"center"}}>✅ {API_CONFIGS[apiProv].name} 연결됨</div>}
        </div>
      </div>}
      <div style={{maxWidth:680,margin:"0 auto",padding:"16px 16px 0"}}>
        {!isSet&&<div style={{marginBottom:12,padding:"10px 14px",borderRadius:8,background:"#8a6a2018",border:"1px solid "+C.gold,color:C.gold,fontSize:12,textAlign:"center"}}>⚠ 우측 상단 <b>⚙ API 설정</b>에서 API 키를 먼저 입력해주세요</div>}
        <div style={{display:"flex",gap:0,marginBottom:20,borderRadius:10,overflow:"hidden",border:"1px solid "+C.border}}>
          {[{key:"bible",label:"✝ 성경 애니메이션"},{key:"psych",label:"🧠 심리학 영상"}].map(c=>(
            <button key={c.key} onClick={()=>setCategory(c.key)} style={{flex:1,padding:"13px 8px",border:"none",background:category===c.key?C.tabActive:C.tabInactive,color:category===c.key?C.gold:C.textMuted,fontWeight:category===c.key?700:400,fontSize:14,cursor:"pointer",transition:"all 0.2s"}}>
              {c.label}
            </button>
          ))}
        </div>
        {category==="bible"?<BibleGenerator/>:<PsychGenerator/>}
      </div>
    </div>
  );
}


    ReactDOM.render(<App/>, document.getElementById('root'));
  </script>
</body>
</html>
